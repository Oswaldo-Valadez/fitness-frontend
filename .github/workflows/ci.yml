name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: OpenAPI contract drift
        run: npm run contract:check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Test suite
        run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # e2e: intentionally omitted for now. Playwright's smoke/admin specs need a
  # seeded fitness-backend (MySQL) running alongside the dev server, and
  # fitness-backend is a private, separate repo — wiring that up here would
  # require a cross-repo checkout secret, which conflicts with keeping this
  # workflow secret-free. Run `npm run test:e2e` locally against a seeded
  # backend until a reproducible backend+MySQL CI setup exists.
