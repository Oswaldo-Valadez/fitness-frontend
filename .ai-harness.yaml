version: 1
project:
  name: fitness-frontend
  topology: single-repo
  primary_language: typescript
  frameworks:
    - React
    - Vite

ownership:
  requirements: UNKNOWN
  api_contract: consumed from backend OpenAPI output
  persistence: null
  frontend_contract_consumer: src/api/generated
  legacy_reference: null

paths:
  source:
    - src/**
    - public/**
  tests:
    - src/**/*.{test,spec}.{ts,tsx}
    - e2e/**/*.spec.ts
  specs: specs
  progress: progress
  generated:
    - src/api/generated/**
  editable_generated_runtime: []
  excluded_search:
    - .git/**
    - node_modules/**
    - vendor/**
    - dist/**
    - build/**
    - coverage/**
    - .next/**
    - out/**
    - tmp/**
    - temp/**
    - "*.log"
    - "*.tsbuildinfo"
    - test-results/**
    - playwright-report/**

commands:
  install: npm ci
  format_check: null
  lint: npm run lint
  typecheck: npm run typecheck
  unit_tests: npm run test
  integration_tests: npm run test
  e2e_tests: npm run test:e2e
  build: npm run build
  contract_generate: npm run gen
  contract_validate: npm run contract:check
  client_generate: npm run gen

verification_profiles:
  targeted:
    - npm run lint
    - npm run typecheck
    - npm run test
  full:
    - npm ci
    - npm run gen
    - npm run contract:check
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm run build

workflow:
  feature_states:
    - pending
    - in_progress
    - review
    - implementation_done
    - done
  max_parallel_features: 1

review:
  severities:
    - Critical
    - High
    - Medium
    - Low
    - Informational
  verdicts:
    - APPROVED
    - CHANGES_REQUESTED
    - BLOCKED

evidence_gaps:
  - Missing project-specific requirements/spec/ADR files.
  - e2e_tests (npm run test:e2e) requires a real seeded fitness-backend
    running locally (see e2e/helpers.ts, playwright.config.ts BASE_URL) —
    not runnable standalone from this repo, and not wired into CI since
    fitness-backend is a private separate repo (see .github/workflows/ci.yml
    comment on the omitted e2e job).
